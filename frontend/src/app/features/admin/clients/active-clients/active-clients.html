<div class="overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
            <i class="fas fa-user mr-2"></i>Trainer Name
          </th>
          <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
            <i class="fas fa-envelope mr-2"></i>Email
          </th>
          <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
            <i class="fas fa-cog mr-2"></i>Actions
          </th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        @for (client of clientsList(); track client.clientId) {
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="flex items-center">
                <!--<div class="flex-shrink-0 h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center">
                  <i class="fas fa-user text-blue-600"></i>
                </div>-->
                <div class="ml-4">
                  <div class="text-sm font-medium text-gray-900">{{client.name}}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-600">{{client.email}}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm">
              <button (click)="deactivateClient(client.clientId)" class="inline-flex items-center px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition-colors font-medium">
                <i class="fas fa-ban mr-2"></i>
                Deactivate
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
