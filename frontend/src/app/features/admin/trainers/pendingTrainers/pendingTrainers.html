    <div class="bg-white rounded-lg shadow-md border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Trainer Name</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Email</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Specialty</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200">
            
              @for (pendingTrainer of pendingTrainingList(); track pendingTrainer.email) {
              <tr class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 text-gray-800">{{pendingTrainer.name}}</td>
              <td class="px-6 py-4 text-gray-600">{{pendingTrainer.email}}</td>
              <td class="px-6 py-4 text-gray-600">{{pendingTrainer.specialization}}</td>
              <td class="px-6 py-4">
                <div class="flex gap-2">
                  <button (click)="approveTrainer(pendingTrainer.instructorId)" class="px-3 py-1 bg-blue-100 text-green-700 rounded-lg hover:bg-blue-200 transition-colors text-sm font-medium">
                    Approve
                  </button>
                  <button class="px-3 py-1 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition-colors text-sm font-medium">
                    Reject
                  </button>
                </div>
              </td>
              </tr>
              }
            
          </tbody>
        </table>
      </div>
    </div>
