<app-sidebar></app-sidebar>

<div class="min-h-screen bg-gray-50 ml-64 pt-20">
  <div class="max-w-7xl mx-auto p-6">
    <div class="p-4">
      
      <div role="tablist" class="flex border-b border-gray-200">
        <button
          (click)="showActive()"
          [class]="activeTab() === 'active' 
            ? 'border-blue-500 text-blue-600 border-b-2' 
            : 'border-transparent text-gray-500 hover:text-gray-700'"
          class="px-6 py-3 text-sm font-medium focus:outline-none transition-colors"
        >
          Active Trainers
        </button>
        
        <button
          (click)="showPending()"
          [class]="activeTab() === 'pending' 
            ? 'border-blue-500 text-blue-600 border-b-2' 
            : 'border-transparent text-gray-500 hover:text-gray-700'"
          class="px-6 py-3 text-sm font-medium focus:outline-none transition-colors"
        >
          Pending Trainers
        </button>
      </div>

    <div class="mt-6">
      @if (activeTab() === 'active') {
        <app-active-trainers></app-active-trainers>
      } @else {
        <app-pending-trainers></app-pending-trainers>
      }
    </div>

    </div>
  </div>
</div>
