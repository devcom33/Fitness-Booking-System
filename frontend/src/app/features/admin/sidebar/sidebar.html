<!-- Sidebar -->
<aside class="h-screen w-64 bg-white shadow-lg fixed left-0 top-0 flex flex-col z-20">
  <!-- Header -->
  <div class="p-6 border-b border-gray-200">
    <h2 class="text-2xl font-bold text-gray-800">Admin Panel</h2>
    <p class="text-xs text-gray-500 mt-1">Management Console</p>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 overflow-y-auto py-4">
    <ul class="space-y-2 px-3">
      @for (item of menuItems; track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-gray-100 text-gray-900 font-semibold"
            class="flex items-center gap-3 px-4 py-3 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors duration-200"
          >
            <span class="text-xl">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer -->
  <div class="p-4 border-t border-gray-200">
    <button class="w-full px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
      <span>🚪</span>
      <span>Logout</span>
    </button>
  </div>
</aside>

<!-- Top Navigation Bar -->
<nav class="bg-white border-b border-gray-200 px-6 py-4 fixed top-0 left-0 right-0 z-10">
  <div class="flex justify-between items-center ml-64">
    <a
      [routerLink]="'/dashboard'"
      class="text-2xl font-bold text-gray-800 hover:text-[#F97316] transition-colors"
    >
      FitBook Admin
    </a>

    <div class="flex items-center space-x-6">
      <a
        [routerLink]="'/dashboard'"
        routerLinkActive="text-[#F97316]"
        class="text-gray-700 hover:text-[#F97316] font-medium transition-colors"
      >
        Dashboard
      </a>
      <a
        [routerLink]="'/admin/reports'"
        routerLinkActive="text-[#F97316]"
        class="text-gray-700 hover:text-[#F97316] font-medium transition-colors"
      >
        Reports
      </a>
      <a
        [routerLink]="'/admin/settings'"
        routerLinkActive="text-[#F97316]"
        class="text-gray-700 hover:text-[#F97316] font-medium transition-colors"
      >
        Settings
      </a>
    </div>
  </div>
</nav>
