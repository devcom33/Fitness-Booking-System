<div class="min-h-screen bg-[#020617] flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-[#111827] rounded-lg shadow-xl p-8">
      <h2 class="text-3xl font-bold text-white mb-8 text-center">Login</h2>

      <form class="space-y-6" (ngSubmit)="login()">
        <div>
          <label class="block text-white text-sm font-medium mb-2"> Email </label>
          <input
            name="email"
            type="email"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
            placeholder="Enter your email"
            [(ngModel)]="authRequest.email"
          />
        </div>

        <div>
          <label class="block text-white text-sm font-medium mb-2"> Password </label>
          <input
            name="password"
            type="password"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
            placeholder="Enter your password"
            [(ngModel)]="authRequest.password"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-[#F97316] hover:bg-[#E11D48] text-white font-bold py-3 px-4 rounded-lg transition-colors duration-200"
        >
          Login
        </button>
      </form>

      <p class="text-center text-gray-400 text-sm mt-6">
        Don't have an account?
        <a href="/register" class="text-[#F97316] hover:text-[#E11D48] font-medium"> Register </a>
      </p>
    </div>
  </div>
</div>
