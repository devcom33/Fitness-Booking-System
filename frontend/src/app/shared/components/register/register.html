<div class="min-h-screen bg-[#020617] relative overflow-hidden flex items-center justify-center p-4">
  <!-- decorative background (same palette) -->
  <div class="absolute -top-24 -left-24 w-72 h-72 rounded-full bg-[#F97316]/10 blur-3xl"></div>
  <div class="absolute -bottom-24 -right-24 w-72 h-72 rounded-full bg-[#E11D48]/10 blur-3xl"></div>

  <div class="w-full max-w-md relative z-10">
    <div class="bg-[#111827]/95 border border-gray-800 rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <h2 class="text-3xl font-bold text-white">Create account</h2>
        <p class="text-gray-400 text-sm mt-2">Join as a client or instructor</p>
      </div>

      <form class="space-y-4" (ngSubmit)="register()">
        <div>
          <label class="block text-white text-sm font-medium mb-2">Name</label>
          <input
            [(ngModel)]="registerRequest.name"
            name="name"
            type="text"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
            placeholder="Enter your name"
          />
        </div>

        <div>
          <label class="block text-white text-sm font-medium mb-2">Email</label>
          <input
            [(ngModel)]="registerRequest.email"
            name="email"
            type="email"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
            placeholder="Enter your email"
          />
        </div>

        <div>
          <label class="block text-white text-sm font-medium mb-2">Role</label>
          <select
            [(ngModel)]="registerRequest.roleDto"
            name="role"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
          >
            <option [ngValue]="null" disabled>Select role</option>
            <option [ngValue]="{ name: RoleName.NameEnum.Client }">Client</option>
            <option [ngValue]="{ name: RoleName.NameEnum.Instructor }">Instructor</option>
          </select>
        </div>
        @if (registerRequest.roleDto?.name === RoleName.NameEnum.Instructor)
        {
        <div>
          <label class="block text-white text-sm font-medium mb-2">Bio</label>
          <textarea
            [(ngModel)]="instructorBio"
            name="bio"
            rows="3"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
            placeholder="Tell us about your training experience"
          ></textarea>
        </div>
      }
      @if (registerRequest.roleDto?.name === RoleName.NameEnum.Instructor)
      {
        <div>
          <label class="block text-white text-sm font-medium mb-2">Specialization</label>
          <input
            [(ngModel)]="instructorSpecialization"
            name="specialization"
            type="text"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
            placeholder="e.g. Strength Training, Yoga, HIIT"
          />
        </div>
      }
        <div>
          <label class="block text-white text-sm font-medium mb-2">Password</label>
          <input
            [(ngModel)]="registerRequest.password"
            name="password"
            type="password"
            class="w-full px-4 py-3 bg-[#020617] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#F97316] focus:ring-1 focus:ring-[#F97316]"
            placeholder="Enter your password"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-[#F97316] hover:bg-[#E11D48] text-white font-bold py-3 px-4 rounded-lg transition-colors duration-200"
        >
          Register
        </button>
      </form>

      <p class="text-center text-gray-400 text-sm mt-6">
        Already have an account?
        <a href="/login" class="text-[#F97316] hover:text-[#E11D48] font-medium">Login</a>
      </p>
    </div>
  </div>
</div>
